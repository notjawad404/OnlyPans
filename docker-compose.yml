services:
  backend:
    build: ./Backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CONNECTION_STRING=${CONNECTION_STRING}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    restart: unless-stopped

  frontend:
    build: 
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

    restart: unless-stopped